<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Denúncias</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card-denuncia { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-denuncia.pendente { border-left-color: #f1c40f; }
        .card-denuncia.tratamento { border-left-color: #3498db; }
        .card-denuncia.resolvido { border-left-color: #2ecc71; }
        .badge { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; color: #fff; }
        .bg-pendente { background: #f1c40f; }
        .bg-tratamento { background: #3498db; }
        .bg-resolvido { background: #2ecc71; }
        select { margin-top: 10px; cursor: pointer; border: 1px solid #ccc; padding: 5px; border-radius: 5px; }
        #btnLogout { background: #95a5a6; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Painel de Gestão</h1>
            <p>Lista de ocorrências recebidas</p>
        </header>

        <div id="listaDenuncias">
            <p style="text-align: center;">Carregando...</p>
        </div>

        <button id="btnLogout">Sair do Painel</button>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
